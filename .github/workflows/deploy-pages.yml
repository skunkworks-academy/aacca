name: Deploy Alberto IDR to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Validate source and release controls
        run: npm run validate

      - name: Build Docusaurus
        run: npm run build

      - name: Verify deployable output
        shell: bash
        run: |
          set -euo pipefail
          test -s build/index.html
          test -s build/CNAME
          grep -Fxq 'aacca.skunkworksacademy.com' build/CNAME
          test -s build/img/favicon-black.svg
          test -s build/img/favicon-white.svg
          test -s build/site.webmanifest
          test -s build/idr/credentials.html || test -s build/idr/credentials/index.html
          test -s build/idr/calendar.html || test -s build/idr/calendar/index.html
          test -s build/alberto-idr-12-week-calendar.ics
          while IFS= read -r page; do
            grep -Fq 'aacca.skunkworksacademy.com' "$page"
            grep -Fq '/img/favicon-black.svg' "$page"
            grep -Fq '/img/favicon-white.svg' "$page"
            grep -Fq '/site.webmanifest' "$page"
            ! grep -Fq 'skunkworks-academy.github.io/aacca' "$page"
            ! grep -Fq '/aacca/' "$page"
          done < <(find build -type f -name '*.html' -print)

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build
          include-hidden-files: true

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
