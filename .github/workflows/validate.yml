name: Validate Alberto IDR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Validate source, privacy and release gates
        run: npm run validate

      - name: Build production site
        run: npm run build

      - name: Verify production output
        shell: bash
        run: |
          set -euo pipefail
          test -s build/index.html
          test -s build/CNAME
          grep -Fxq 'aacca.skunkworksacademy.com' build/CNAME
          test -s build/img/favicon-black.svg
          test -s build/img/favicon-white.svg
          test -s build/site.webmanifest
          test -s build/idr/credentials.html || test -s build/idr/credentials/index.html
          test -s build/idr/calendar.html || test -s build/idr/calendar/index.html
          test -s build/alberto-idr-12-week-calendar.ics
          while IFS= read -r page; do
            grep -Fq 'aacca.skunkworksacademy.com' "$page"
            grep -Fq '/img/favicon-black.svg' "$page"
            grep -Fq '/img/favicon-white.svg' "$page"
            grep -Fq '/site.webmanifest' "$page"
            ! grep -Fq 'skunkworks-academy.github.io/aacca' "$page"
            ! grep -Fq '/aacca/' "$page"
          done < <(find build -type f -name '*.html' -print)
