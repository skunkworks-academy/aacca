name: Validate Alberto IDR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Validate source, privacy and learning gates
        run: npm run validate

      - name: Build production site
        shell: bash
        run: |
          set +e
          npm run build > docusaurus-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Docusaurus production build failed. Relevant output:"
            tail -n 120 docusaurus-build.log
            exit "$status"
          fi
          cat docusaurus-build.log

      - name: Verify production output
        run: |
          test -s build/index.html
          test -s build/idr/credentials/index.html
          test -s build/idr/calendar/index.html
          test -s build/alberto-idr-12-week-calendar.ics
